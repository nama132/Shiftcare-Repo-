{% extends "admin/base.html" %}
{% block content %}
<div class="page-header">
  <h1>{{ '✏️ Edit Caregiver' if caregiver else '➕ New Caregiver' }}</h1>
  <a href="{{ url_for('admin_caregivers') }}" class="btn btn-primary">← Back</a>
</div>
<div class="form-card">
  <form method="POST">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" name="name" value="{{ caregiver.name if caregiver else '' }}" placeholder="Maria Santos" required/>
    </div>
    <div class="form-group">
      <label>Phone Number</label>
      <input type="text" name="phone" value="{{ caregiver.phone if caregiver else '' }}" placeholder="+12025551234" required/>
    </div>
    <div class="form-group">
      <label>ZIP Code</label>
      <input type="text" name="zip_code" value="{{ caregiver.zip_code if caregiver else '' }}" placeholder="20001" required/>
    </div>
    <div class="form-group">
      <div class="form-check">
        <input type="checkbox" name="available" value="1" {{ 'checked' if not caregiver or caregiver.active }}/>
        <label style="margin:0">Available for shifts</label>
      </div>
    </div>
    <button type="submit" class="btn btn-primary">{{ 'Save Changes' if caregiver else 'Add Caregiver' }}</button>
  </form>
</div>
{% endblock %}
