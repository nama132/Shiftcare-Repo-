{% extends "admin/base.html" %}
{% block content %}
<div class="page-header">
  <h1>{{ '✏️ Edit Client' if client else '➕ New Client' }}</h1>
  <a href="{{ url_for('admin_clients') }}" class="btn btn-primary">← Back</a>
</div>
<div class="form-card">
  <form method="POST">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" name="name" value="{{ client.name if client else '' }}" placeholder="Robert Hayes" required/>
    </div>
    <div class="form-group">
      <label>Family Phone Number</label>
      <input type="text" name="phone" value="{{ client.family_phone if client else '' }}" placeholder="+12025559876" required/>
    </div>
    <div class="form-group">
      <label>Address</label>
      <input type="text" name="address" value="{{ client.address if client else '' }}" placeholder="123 Main St NW" required/>
    </div>
    <div class="form-group">
      <label>ZIP Code</label>
      <input type="text" name="zip_code" value="{{ client.zip_code if client else '' }}" placeholder="20001" required/>
    </div>
    <button type="submit" class="btn btn-primary">{{ 'Save Changes' if client else 'Add Client' }}</button>
  </form>
</div>
{% endblock %}
