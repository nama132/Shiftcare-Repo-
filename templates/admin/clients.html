{% extends "admin/base.html" %}
{% block content %}
<div class="page-header">
  <h1>🧓 Clients</h1>
  <a href="{{ url_for('admin_client_new') }}" class="btn btn-primary">+ Add Client</a>
</div>
<div class="card">
  <table>
    <thead>
      <tr><th>ID</th><th>Name</th><th>Phone</th><th>Address</th><th>ZIP</th><th>Actions</th></tr>
    </thead>
    <tbody>
      {% for c in clients %}
      <tr>
        <td>{{ c.id }}</td>
        <td>{{ c.name }}</td>
        <td>{{ c.family_phone }}</td>
        <td>{{ c.address }}</td>
        <td>{{ c.zip_code }}</td>
        <td>
          <a href="{{ url_for('admin_client_edit', cid=c.id) }}" class="btn btn-primary btn-sm">Edit</a>
          <form method="POST" action="{{ url_for('admin_client_delete', cid=c.id) }}"
                style="display:inline" onsubmit="return confirm('Delete {{ c.name }}?')">
            <button type="submit" class="btn btn-danger btn-sm">Delete</button>
          </form>
        </td>
      </tr>
      {% else %}
      <tr><td colspan="6" style="text-align:center;color:#718096">No clients yet.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
